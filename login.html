<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BGS.GG Admin – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0b1a; --card: #1e1a35; --border: #2e2850;
      --pink: #ff4fa3; --purple: #a855f7; --text: #f0eaff; --muted: #8b80b0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px;
    }
    .logo {
      font-family: 'Baloo 2', cursive; font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(90deg, #ff4fa3, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; text-align: center; margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); text-align: center; font-size: 0.875rem; margin-bottom: 32px; }
    label { display: block; font-weight: 700; font-size: 0.8rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    input {
      width: 100%; background: #16132a; border: 1px solid var(--border);
      color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      padding: 11px 16px; border-radius: 10px; outline: none; margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--purple); }
    button {
      width: 100%; background: linear-gradient(135deg, #ff4fa3, #a855f7);
      color: #fff; border: none; font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 1rem; padding: 13px; border-radius: 12px;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    .error {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #f87171; border-radius: 10px; padding: 10px 14px;
      font-size: 0.875rem; font-weight: 600; margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BGS.GG</div>
    <div class="subtitle">Admin Panel</div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>Username</label>
      <input type="text" name="username" placeholder="admin" autocomplete="username"/>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
